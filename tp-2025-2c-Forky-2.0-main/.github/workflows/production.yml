name: production test

on:
  pull_request:
    branches:
      - development
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker
        run: docker build -t sisop .

      - name: Run Docker
        run: docker run --rm sisop echo "success"
